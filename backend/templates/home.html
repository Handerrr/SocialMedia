<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>SocialMedia API</title>

    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: #111827;
        padding: 40px;
        border-radius: 20px;
        width: 400px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin-bottom: 10px;
        font-size: 32px;
      }

      p {
        color: #9ca3af;
        margin-bottom: 30px;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      a {
        text-decoration: none;
        background: #2563eb;
        color: white;
        padding: 14px;
        border-radius: 12px;
        transition: 0.2s;
        font-weight: bold;
      }

      a:hover {
        background: #1d4ed8;
      }

      .status {
        margin-top: 25px;
        color: #22c55e;
        font-size: 14px;
      }

  <body>
    <div class="card">
      <h1>SocialMedia API 🚀</h1>

      <p>Backend online e funcionando.</p>

      <div class="links">
        <a href="https://socialmedia-1-brq2.onrender.com">
          Abrir Frontend
        </a>

        <a href="/api/"> API Endpoints </a>

        <a href="https://github.com/Handerrr/SocialMedia/blob/main/README.md"> Entenda as funcionalidades do Projeto </a>
      </div>
